name: Publish Package

on:
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

concurrency:
  group: publish-${{ github.ref }}
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    environment: npm

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - name: Setup Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org
          package-manager-cache: false

      - name: Pin npm
        run: npm install -g npm@11.6.2

      - name: Install
        run: npm ci

      - name: Verify release readiness
        run: npm run release:check
        env:
          VERIFY_RELEASE_TAG: 'true'

      - name: Verify external release state
        run: npm run check:external

      - name: Pack release artifact
        run: |
          mkdir -p release-artifacts
          npm pack --pack-destination release-artifacts --json > release-artifacts/npm-pack.json

      - name: Verify release artifact
        run: npm run check:release-artifacts

      - name: Upload release artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: apg-patterns-package-${{ github.sha }}
          path: release-artifacts/
          if-no-files-found: error
          retention-days: 30

      - name: Publish with provenance
        run: npm publish --access public --provenance --registry https://registry.npmjs.org/
